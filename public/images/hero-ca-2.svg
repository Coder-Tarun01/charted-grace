<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#0A1020"/>
      <stop offset="1" stop-color="#05060B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 260) rotate(35) scale(720 520)">
      <stop stop-color="#F97316" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1500 240) rotate(10) scale(680 460)">
      <stop stop-color="#FDBA74" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FDBA74" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FDBA74"/>
    </linearGradient>
    <filter id="cardShadow" x="-50" y="-50" width="2100" height="1300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <!-- Subtle diagonal texture -->
  <g opacity="0.10">
    <path d="M-120 980L860 0" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <path d="M40 1080L1020 100" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <path d="M220 1080L1200 220" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <path d="M420 1080L1400 360" stroke="#FFFFFF" stroke-opacity="0.05"/>
    <path d="M620 1080L1600 520" stroke="#FFFFFF" stroke-opacity="0.05"/>
  </g>

  <!-- Right-side "client dossier" stack -->
  <g filter="url(#cardShadow)">
    <!-- Back sheet -->
    <rect x="1200" y="210" width="600" height="680" rx="40" fill="#0B1220" fill-opacity="0.35" stroke="#FFFFFF" stroke-opacity="0.10"/>
    <!-- Middle sheet -->
    <rect x="1168" y="240" width="600" height="680" rx="40" fill="#0B1220" fill-opacity="0.45" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <!-- Front sheet -->
    <rect x="1136" y="270" width="600" height="680" rx="40" fill="#0B1220" fill-opacity="0.60" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="1136" y="270" width="600" height="6" rx="3" fill="url(#accent)"/>

    <!-- Header -->
    <g transform="translate(1184 322)">
      <circle cx="10" cy="10" r="6" fill="#F97316"/>
      <text x="28" y="16" fill="#FFFFFF" fill-opacity="0.85" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="900" letter-spacing="0.18em">CLIENT FILE</text>
      <text x="0" y="54" fill="#FFFFFF" fill-opacity="0.70" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="700" letter-spacing="0.10em">ENGAGEMENT STATUS</text>
      <rect x="0" y="66" width="210" height="10" rx="5" fill="#FFFFFF" fill-opacity="0.10"/>
      <rect x="0" y="66" width="148" height="10" rx="5" fill="url(#accent)"/>
    </g>

    <!-- KPI blocks -->
    <g transform="translate(1184 444)">
      <rect x="0" y="0" width="248" height="132" rx="22" fill="#0B1220" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="20" y="40" fill="#FFFFFF" fill-opacity="0.75" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="800" letter-spacing="0.12em">TURNAROUND</text>
      <text x="20" y="88" fill="#FFFFFF" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="900">24-48h</text>
    </g>
    <g transform="translate(1452 444)">
      <rect x="0" y="0" width="248" height="132" rx="22" fill="#0B1220" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.10"/>
      <text x="20" y="40" fill="#FFFFFF" fill-opacity="0.75" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="800" letter-spacing="0.12em">COMPLIANCE</text>
      <text x="20" y="88" fill="#FFFFFF" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="900">100%</text>
    </g>

    <!-- Checklist -->
    <g transform="translate(1184 612)">
      <text x="0" y="18" fill="#FFFFFF" fill-opacity="0.70" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="12" font-weight="800" letter-spacing="0.10em">ACTIVE TASKS</text>
      <g transform="translate(0 34)" opacity="0.92">
        <rect x="0" y="0" width="516" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <circle cx="24" cy="24" r="8" fill="url(#accent)"/>
        <path d="M20 24l3 3 6-8" stroke="#0B1220" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="44" y="29" fill="#FFFFFF" fill-opacity="0.82" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="800">Registration & Licensing</text>
      </g>
      <g transform="translate(0 92)" opacity="0.88">
        <rect x="0" y="0" width="516" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <circle cx="24" cy="24" r="8" fill="#F97316" fill-opacity="0.65"/>
        <path d="M20 24l3 3 6-8" stroke="#0B1220" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="44" y="29" fill="#FFFFFF" fill-opacity="0.78" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="800">Monthly Compliance</text>
      </g>
      <g transform="translate(0 150)" opacity="0.84">
        <rect x="0" y="0" width="516" height="48" rx="16" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10"/>
        <circle cx="24" cy="24" r="8" fill="#FFFFFF" fill-opacity="0.18"/>
        <path d="M20 24l3 3 6-8" stroke="#0B1220" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="44" y="29" fill="#FFFFFF" fill-opacity="0.72" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="14" font-weight="800">Audit Preparation</text>
      </g>
    </g>

    <!-- Circular "CA" seal -->
    <g transform="translate(1578 820)">
      <circle cx="86" cy="86" r="86" fill="#0B1220" fill-opacity="0.65" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="86" cy="86" r="70" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 10"/>
      <text x="86" y="96" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="44" font-weight="1000" letter-spacing="0.06em">CA</text>
      <text x="86" y="132" text-anchor="middle" fill="#FFFFFF" fill-opacity="0.70" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="11" font-weight="900" letter-spacing="0.20em">CLIENT CARE</text>
    </g>
  </g>
</svg>
